name: Build VoiceBook APK - FIXED

on: 
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      
    - name: ⎔ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Instalar dependencias
      run: |
        npm install
        npm install -g @capacitor/cli

            - name: 🎨 Generar íconos de la app
      run: |
        # Instalar herramienta de íconos de Capacitor
        npm install -g @capacitor/assets
        
        # Crear ícono temporal (si no tienes uno)
        mkdir -p temp-icons
        echo "🎤 Creando ícono temporal..."
        
        # Crear un ícono básico con texto (si no tienes imagen)
        cat > create-icon.js << 'EOF'
        const { createCanvas } = require('canvas');
        const fs = require('fs');
        const canvas = createCanvas(512, 512);
        const ctx = canvas.getContext('2d');
        
        // Fondo
        ctx.fillStyle = '#3498db';
        ctx.fillRect(0, 0, 512, 512);
        
        // Texto
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🎤', 256, 200);
        ctx.font = 'bold 40px Arial';
        ctx.fillText('VoiceBook', 256, 300);
        
        // Guardar
        const buffer = canvas.toBuffer('image/png');
        fs.writeFileSync('temp-icons/icon.png', buffer);
        console.log('Ícono temporal creado');
        EOF
        
        node create-icon.js
        
        # Generar íconos para Android
        npx capacitor-assets generate --android
        
    - name: 📁 Crear estructura de carpetas
      run: |
        # Crear carpeta www y copiar todo ahí
        mkdir -p www
        cp -r *.html www/ || true
        cp -r css www/ || true
        cp -r js www/ || true
        cp -r img www/ || true
        
    - name: 🛠 Configurar Capacitor CORREGIDO
      run: |
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        npx cap add android
        
        - name: 🛠 Configurar Capacitor CORREGIDO
      run: |
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        npx cap add android
        
        # Configurar ícono en Android
        cat > android/app/src/main/res/values/strings.xml << EOF
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">VoiceBook</string>
        </resources>
        EOF
        
    - name: 🏗 Construir APK
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug
        
    - name: 📤 Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceBook-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
