name: Build VoiceBook APK - STABLE

on: 
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      
    - name: ⎔ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 Instalar Capacitor
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android
        echo "✅ Capacitor instalado"

            - name: 🎯 VERIFICAR que el CSS existe
      run: |
        echo "🔍 Verificando archivos CSS..."
        if [ -f "css/style.css" ]; then
          echo "✅ CSS encontrado"
          ls -la css/
          head -10 css/style.css
        else
          echo "❌ ERROR: css/style.css NO EXISTE"
          find . -name "*.css" -o -name "style.css"
        fi
    - name: 📁 Preparar archivos web
      run: |
        echo "📂 Creando estructura para la app..."
        mkdir -p www
        # Copiar archivos esenciales
        cp index.html www/ 2>/dev/null || echo "⚠️ index.html no encontrado"
        cp profile.html www/ 2>/dev/null || echo "⚠️ profile.html no encontrado"
        [ -d "css" ] && cp -r css www/ || echo "⚠️ Sin css"
        [ -d "js" ] && cp -r js www/ || echo "⚠️ Sin js"
        [ -d "img" ] && cp -r img www/ || echo "⚠️ Sin img"
        echo "📁 Estructura creada correctamente"
        
    - name: 🔧 Corrección SEGURA de rutas
      run: |
        echo "🔄 Aplicando correcciones de rutas..."
        
        # Función segura para corregir archivos
        correct_file() {
          local file=$1
          if [ -f "$file" ]; then
            # Hacer backup primero
            cp "$file" "$file.backup"
            
            # Aplicar correcciones de forma segura
            sed -i.bak 's|href="css/|href="./css/|g' "$file" 2>/dev/null || true
            sed -i.bak 's|src="js/|src="./js/|g' "$file" 2>/dev/null || true  
            sed -i.bak 's|src="img/|src="./img/|g' "$file" 2>/dev/null || true
            
            # Verificar que el archivo no esté corrupto
            if [ -s "$file" ]; then
              echo "✅ $file corregido"
              rm -f "$file.bak"
            else
              # Restaurar backup si algo salió mal
              mv "$file.backup" "$file"
              echo "⚠️ $file se mantiene original (error en corrección)"
            fi
          fi
        }
        
        # Aplicar a archivos HTML
        correct_file "www/index.html"
        correct_file "www/profile.html"
        
        echo "🎯 Corrección de rutas completada"
        
    - name: 🛠 Inicializar Capacitor
      run: |
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        npx cap add android
        echo "✅ Capacitor inicializado"
        
    - name: ⚙️ Configurar para móvil
      run: |
        cat > capacitor.config.json << EOF
        {
          "appId": "com.tuvoz.voicebook",
          "appName": "VoiceBook",
          "webDir": "www",
          "server": {
            "url": "https://braiannm.github.io/VoiceBook",
            "cleartext": true
          }
        }
        EOF
        echo "📄 Configuración aplicada"
        
    - name: 🏗 Construir APK
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace
        
    - name: 📤 Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceBook-App-Stable
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
