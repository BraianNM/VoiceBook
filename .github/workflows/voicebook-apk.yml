name: Build VoiceBook APK - FIXED

on: 
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      
    - name: ⎔ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 Instalar Capacitor
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android
        echo "✅ Capacitor instalado"
        
    - name: 🎯 Verificar archivos CSS
      run: |
        echo "🔍 Verificando archivos..."
        if [ -f "css/style.css" ]; then
          echo "✅ CSS encontrado"
          ls -la css/
        else
          echo "❌ CSS no encontrado"
          find . -name "*.css" | head -10
        fi
        
    - name: 📁 Preparar archivos web
      run: |
        echo "📂 Creando estructura para la app..."
        mkdir -p www
        cp index.html www/ 2>/dev/null || echo "⚠️ index.html no encontrado"
        cp profile.html www/ 2>/dev/null || echo "⚠️ profile.html no encontrado"
        [ -d "css" ] && cp -r css www/ || echo "⚠️ Sin css"
        [ -d "js" ] && cp -r js www/ || echo "⚠️ Sin js"
        [ -d "img" ] && cp -r img www/ || echo "⚠️ Sin img"
        echo "📁 Estructura creada"
        
    - name: 🔧 Corrección de rutas
      run: |
        echo "🔄 Corrigiendo rutas..."
        # Solo corregir HTML por ahora
        if [ -f "www/index.html" ]; then
          sed -i 's|href="css/|href="./css/|g' www/index.html
          sed -i 's|src="js/|src="./js/|g' www/index.html
          sed -i 's|src="img/|src="./img/|g' www/index.html
          echo "✅ index.html corregido"
        fi
        
    - name: 🛠 Inicializar Capacitor
      run: |
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        npx cap add android
        echo "✅ Capacitor inicializado"
        
    - name: ⚙️ Configurar para móvil
      run: |
        cat > capacitor.config.json << EOF
        {
          "appId": "com.tuvoz.voicebook",
          "appName": "VoiceBook",
          "webDir": "www",
          "server": {
            "url": "https://braiannm.github.io/VoiceBook",
            "cleartext": true
          }
        }
        EOF
        echo "📄 Configuración aplicada"
        
    - name: 🏗 Construir APK
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace
        
    - name: 📤 Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceBook-App-Fixed
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
