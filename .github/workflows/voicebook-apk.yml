name: Build VoiceBook APK

on: 
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      
    - name: ⎔ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 Instalar Capacitor
      run: |
        npm install -g @capacitor/cli
        echo "✅ Capacitor instalado"
        
    - name: 📁 Preparar archivos web
      run: |
        echo "📂 Creando estructura para la app..."
        mkdir -p www
        # Copiar solo lo esencial
        cp index.html www/ 2>/dev/null || echo "⚠️ index.html no encontrado"
        cp profile.html www/ 2>/dev/null || echo "⚠️ profile.html no encontrado"
        [ -d "css" ] && cp -r css www/ || echo "⚠️ Sin css"
        [ -d "js" ] && cp -r js www/ || echo "⚠️ Sin js"
        [ -d "img" ] && cp -r img www/ || echo "⚠️ Sin img"
        echo "📁 Contenido de www/:"
        ls -la www/
        
    - name: 🛠 Inicializar Capacitor
      run: |
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        npx cap add android
        echo "✅ Capacitor inicializado"
        
    - name: 🔧 Configurar Firebase móvil
      run: |
        cat > capacitor.config.json << EOF
        {
          "appId": "com.tuvoz.voicebook",
          "appName": "VoiceBook",
          "webDir": "www",
          "server": {
            "url": "https://braiannm.github.io/VoiceBook",
            "cleartext": true
          }
        }
        EOF
        echo "📄 Configuración lista"
        
    - name: 🏗 Construir APK
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug
        
    - name: 📤 Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceBook-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
