name: Build VoiceBook APK - WORKING

on: 
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      
    - name: ⎔ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Instalar dependencias
      run: |
        npm install
        npm install -g @capacitor/cli
        
    - name: 📁 Crear estructura web
      run: |
        echo "🔄 Preparando archivos para la app..."
        mkdir -p www
        # Copiar archivos HTML
        find . -maxdepth 1 -name "*.html" -exec cp {} www/ \; 2>/dev/null || true
        # Copiar carpetas
        [ -d "css" ] && cp -r css www/ || echo "⚠️ No hay carpeta css"
        [ -d "js" ] && cp -r js www/ || echo "⚠️ No hay carpeta js" 
        [ -d "img" ] && cp -r img www/ || echo "⚠️ No hay carpeta img"
        echo "✅ Estructura creada:"
        ls -la www/
        
    - name: 🛠 Configurar Capacitor
      run: |
        echo "🚀 Inicializando Capacitor..."
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        npx cap add android
        echo "✅ Capacitor configurado"
        
    - name: 🔧 Configuración móvil
      run: |
        cat > capacitor.config.json << EOF
        {
          "appId": "com.tuvoz.voicebook",
          "appName": "VoiceBook",
          "webDir": "www",
          "server": {
            "url": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}",
            "cleartext": true
          }
        }
        EOF
        echo "📄 Configuración:"
        cat capacitor.config.json
        
    - name: 🏗 Construir APK
      run: |
        echo "🔨 Sincronizando con Android..."
        npx cap sync android
        echo "🏗 Construyendo APK..."
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace
        
    - name: 📤 Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceBook-App-Working
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
