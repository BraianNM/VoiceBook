name: Build VoiceBook APK - FIXED

on: 
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      
    - name: ⎔ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Instalar dependencias
      run: |
        npm install
        npm install -g @capacitor/cli
        
    - name: 📁 Crear estructura de carpetas
      run: |
        # Crear carpeta www y copiar todo ahí
        mkdir -p www
        cp -r *.html www/ || true
        cp -r css www/ || true
        cp -r js www/ || true
        cp -r img www/ || true
        
    - name: 🛠 Configurar Capacitor CORREGIDO
      run: |
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        npx cap add android
        
    - name: 🔧 Configurar para GitHub Pages
      run: |
        # Configuración corregida
        cat > capacitor.config.json << EOF
        {
          "appId": "com.tuvoz.voicebook",
          "appName": "VoiceBook", 
          "webDir": "www",
          "server": {
            "url": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}",
            "cleartext": true
          }
        }
        EOF
        
    - name: 🏗 Construir APK
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug
        
    - name: 📤 Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceBook-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
