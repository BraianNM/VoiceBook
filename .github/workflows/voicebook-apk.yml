name: Build VoiceBook APK - FIXED

on: 
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v4
      
    - name: ⎔ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 Instalar dependencias COMPLETAS
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android
        echo "✅ Todas las dependencias instaladas"
        
    - name: 📁 Preparar archivos web
      run: |
        echo "📂 Creando estructura para la app..."
        mkdir -p www
        # Copiar archivos esenciales
        cp index.html www/ 2>/dev/null || echo "⚠️ index.html no encontrado"
        cp profile.html www/ 2>/dev/null || echo "⚠️ profile.html no encontrado"
        [ -d "css" ] && cp -r css www/ || echo "⚠️ Sin css"
        [ -d "js" ] && cp -r js www/ || echo "⚠️ Sin js"
        [ -d "img" ] && cp -r img www/ || echo "⚠️ Sin img"
        echo "📁 Estructura creada correctamente"

            - name: 🔧 Corregir TODAS las rutas para móvil
      run: |
        echo "🔄 Corrigiendo rutas absolutas para app móvil..."
        # Corregir index.html
        if [ -f "www/index.html" ]; then
          sed -i 's|href="css/|href="./css/|g' www/index.html
          sed -i 's|src="js/|src="./js/|g' www/index.html
          sed -i 's|src="img/|src="./img/|g' www/index.html
          echo "✅ index.html corregido"
        fi
        
        # Corregir profile.html
        if [ -f "www/profile.html" ]; then
          sed -i 's|href="css/|href="./css/|g' www/profile.html
          sed -i 's|src="js/|src="./js/|g' www/profile.html
          sed -i 's|src="img/|src="./img/|g' www/profile.html
          echo "✅ profile.html corregido"
        fi
        
        # Verificar cambios
        echo "📄 Rutas en index.html:"
        grep -E 'href=|src=' www/index.html | head -3

            - name: 🔧 Corregir TODAS las rutas para móvil
      run: |
        echo "🔄 Corrigiendo rutas absolutas para app móvil..."
        
        # Corregir index.html
        if [ -f "www/index.html" ]; then
          sed -i 's|href="css/|href="./css/|g' www/index.html
          sed -i 's|src="js/|src="./js/|g' www/index.html
          sed -i 's|src="img/|src="./img/|g' www/index.html
          echo "✅ index.html corregido"
        fi
        
        # Corregir profile.html
        if [ -f "www/profile.html" ]; then
          sed -i 's|href="css/|href="./css/|g' www/profile.html
          sed -i 's|src="js/|src="./js/|g' www/profile.html
          sed -i 's|src="img/|src="./img/|g' www/profile.html
          echo "✅ profile.html corregido"
        fi
        
        # Corregir archivos JavaScript
        if [ -f "www/js/app.js" ]; then
          sed -i "s|'img/|\"./img/|g" www/js/app.js
          sed -i 's|"img/|"./img/|g' www/js/app.js
          echo "✅ app.js corregido"
        fi
        
        if [ -f "www/js/auth.js" ]; then
          sed -i "s|'img/|\"./img/|g" www/js/auth.js
          sed -i 's|"img/|"./img/|g' www/js/auth.js
          echo "✅ auth.js corregido"
        fi
        
        if [ -f "www/js/profile.js" ]; then
          sed -i "s|'img/|\"./img/|g" www/js/profile.js
          sed -i 's|"img/|"./img/|g' www/js/profile.js
          echo "✅ profile.js corregido"
        fi
        
        # Verificar cambios
        echo "📄 Rutas corregidas:"
        grep -n 'href=\|src=' www/index.html | head -3
        
    - name: 🛠 Inicializar Capacitor CORREGIDO
      run: |
        echo "🚀 Inicializando Capacitor..."
        npx cap init VoiceBook com.tuvoz.voicebook --web-dir www
        echo "📱 Agregando plataforma Android..."
        npx cap add android
        echo "✅ Capacitor configurado correctamente"
        
    - name: 🔧 Configurar para móvil
      run: |
        cat > capacitor.config.json << EOF
        {
          "appId": "com.tuvoz.voicebook",
          "appName": "VoiceBook",
          "webDir": "www",
          "server": {
            "url": "https://braiannm.github.io/VoiceBook",
            "cleartext": true
          }
        }
        EOF
        echo "📄 Configuración aplicada"
        
    - name: 🏗 Sincronizar y construir
      run: |
        echo "🔄 Sincronizando con Android..."
        npx cap sync android
        echo "🏗 Construyendo APK..."
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace
        
    - name: 📤 Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceBook-App-Final
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
